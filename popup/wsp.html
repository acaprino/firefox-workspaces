<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="text/html" charset="utf-8">
    <title>Workspaces</title>
    <link rel="stylesheet" href="css/wsp.css">
</head>
<body>
<div id="custom-dialog-backdrop">
    <div class="custom-dialog">
        <div class="custom-dialog-message" id="custom-dialog-message"></div>
        <div class="custom-dialog-body">
            <div class="custom-dialog-input-row" id="custom-dialog-input-row" hidden>
                <button type="button" id="custom-dialog-icon-btn" class="icon-picker-btn" title="Choose icon"></button>
                <input type="text" id="custom-dialog-input" class="custom-dialog-input"/>
            </div>
            <!-- Color picker row -->
            <div class="custom-dialog-color-row" id="custom-dialog-color-row" hidden>
                <label id="color-picker-label">Color</label>
                <div class="color-swatches" id="color-swatches" role="radiogroup" aria-labelledby="color-picker-label"></div>
            </div>
            <!-- Checkbox row (shown in export dialog) -->
            <div class="custom-dialog-checkbox-row" id="custom-dialog-checkbox-row" hidden>
                <label>
                    <input type="checkbox" id="custom-dialog-checkbox">
                    <span id="custom-dialog-checkbox-label"></span>
                </label>
            </div>
            <!-- Folder picker row (shown in restore dialog) -->
            <div class="custom-dialog-folder-row" id="custom-dialog-folder-row" hidden>
                <label for="custom-dialog-folder-select">Bookmark folder</label>
                <select id="custom-dialog-folder-select" class="custom-dialog-select"></select>
            </div>
            <!-- Container picker row (shown in create/rename dialog) -->
            <div class="custom-dialog-container-row" id="custom-dialog-container-row" hidden>
                <label for="custom-dialog-container-select">Container</label>
                <select id="custom-dialog-container-select" class="custom-dialog-select"></select>
            </div>
            <div id="icon-picker" class="icon-picker">
                <div class="icon-grid" id="icon-grid"></div>
                <button type="button" id="icon-clear-btn" class="icon-clear-btn">Remove icon</button>
            </div>
        </div>
        <div class="custom-dialog-footer">
            <div class="custom-dialog-buttons">
                <button id="custom-dialog-cancel">Cancel</button>
                <button id="custom-dialog-ok">OK</button>
            </div>
        </div>
    </div>
</div>
<div class="container" id="wsp-container">
    <div class="title">
      Workspaces
    </div>
    <!-- Refuse-to-wipe error banner -->
    <div id="wsp-error-banner" class="wsp-error-banner" role="alert" hidden>
        <div class="wsp-error-banner-text" id="wsp-error-banner-text"></div>
        <div class="wsp-error-banner-actions">
            <button type="button" id="wsp-error-copy">Copy diagnostic dump</button>
            <button type="button" id="wsp-error-acknowledge" title="Dismiss this banner. The next Firefox restart will retry the restore.">Dismiss</button>
            <button type="button" id="wsp-error-give-up" title="Permanently abandon the restore retry. Only do this if you do not need the workspaces from before the failed restart." class="wsp-error-give-up">Give up</button>
        </div>
    </div>
    <!-- Tab search (Tier 3) -->
    <div class="wsp-search" id="wsp-search">
        <input type="text" id="wsp-search-input" placeholder="Search tabs..." autocomplete="off" aria-label="Search tabs">
    </div>
    <div id="wsp-search-results" class="wsp-search-results" hidden></div>
    <ul id="wsp-list" role="list"></ul>
    <!-- Closed tabs section (Tier 2) -->
    <div id="wsp-closed-tabs" class="wsp-closed-tabs" hidden>
        <div class="wsp-closed-tabs-header">
            <span>Recently Closed</span>
            <button type="button" id="wsp-closed-tabs-clear" class="wsp-closed-tabs-clear">Clear all</button>
        </div>
        <ul id="wsp-closed-tabs-list" class="wsp-closed-tabs-list"></ul>
    </div>
    <div class="footer-container">
        <a href="#" class="footer" id="createNewWsp">New workspace</a>
        <a href="#" class="footer" id="restoreFromBookmarks">Restore from bookmarks</a>
        <a href="#" class="footer footer-diagnostic" id="wsp-copy-diagnostics" title="Copy a JSON dump of all extension storage for diagnostics">Copy diagnostics</a>
    </div>
</div>
<script src="../backend/theme-utils.js"></script>
<script src="js/dialog.js"></script>
<script src="js/tooltip.js"></script>
<script src="js/drag-drop.js"></script>
<script src="js/wsp.js"></script>
</body>
</html>
